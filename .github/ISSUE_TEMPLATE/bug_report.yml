name: Bug report
description: Report a reproducible problem
labels:
  - bug
body:
  - type: input
    id: app_name
    attributes:
      label: App name
      description: Which app is affected? (e.g. deadline-app, kendama-mobile)
      placeholder: deadline-app
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: 1.0.0
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the issue in 1-2 sentences.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide clear steps.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs or attach screenshots if available.
      render: shell
    validations:
      required: false
