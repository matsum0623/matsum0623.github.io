<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>けん玉練習アプリ | アプリ紹介</title>
    <meta
      name="description"
      content="けん玉練習アプリの公式紹介ページです。アプリの特徴、プライバシーポリシー、利用規約をご案内します。"
    />
    <style>
      :root {
        --bg: #fff8eb;
        --card: #ffffff;
        --text: #3f2305;
        --muted: #7c5a36;
        --border: #f0d7aa;
        --link: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #ffe8c2 0%, var(--bg) 46%);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 28px 16px 40px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .features {
        margin-top: 16px;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.8;
      }

      .links {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      a {
        display: block;
        text-decoration: none;
        color: var(--link);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        background: #fffaf2;
        font-weight: 600;
      }

      a:hover {
        background: #fff3df;
      }

      .home-link {
        margin-top: 16px;
      }

      .home-link a {
        display: inline-block;
        width: auto;
      }

      .note {
        margin-top: 14px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>けん玉練習アプリ</h1>
        <p>日々の練習を記録しながら、級・段位の上達をサポートする練習管理アプリです。</p>

        <ul class="features">
          <li>技ごとの成功・失敗を手早く記録できる</li>
          <li>級・段位ごとの達成状況を見える化できる</li>
          <li>毎日の継続を促すチャレンジ機能を利用できる</li>
        </ul>

        <div class="links">
          <a href="https://github.com/matsum0623/kendama-mobile/issues" rel="noopener noreferrer" target="_blank">サポート（お問い合わせ）</a>
          <a href="/kendama-mobile/privacy-policy.html">プライバシーポリシー</a>
          <a href="/kendama-mobile/terms-of-service.html">利用規約</a>
        </div>

        <div class="home-link">
          <a href="/">トップページへ戻る</a>
        </div>

        <p class="note">このページは App Store のマーケティングURLおよびサポート情報ページとして利用しています。</p>
      </section>
    </main>
  </body>
</html>
