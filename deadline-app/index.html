<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>シンプルタスク | サポート情報</title>
    <meta
      name="description"
      content="シンプルタスクの公式ページです。サポート、プライバシーポリシー、利用規約をご案内します。"
    />
    <style>
      :root {
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --border: #dbe3ef;
        --link: #175cd3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #e4efff 0%, var(--bg) 45%);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 28px 16px 40px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .links {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      a {
        display: block;
        text-decoration: none;
        color: var(--link);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        background: #f8fbff;
        font-weight: 600;
      }

      a:hover {
        background: #f1f7ff;
      }

      .note {
        margin-top: 14px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>シンプルタスク</h1>
        <p>毎日の期限管理をシンプルに続けるためのタスク管理アプリです。</p>

        <div class="links">
          <a href="https://github.com/matsum0623/matsum0623.github.io/issues" rel="noopener noreferrer" target="_blank">サポート（お問い合わせ）</a>
          <a href="/deadline-app/privacy-policy.html">プライバシーポリシー</a>
          <a href="/deadline-app/terms-of-service.html">利用規約</a>
          <a href="/app-ads.txt">app-ads.txt</a>
        </div>

        <p class="note">このページは App Store のマーケティングURLおよびサポート情報ページとして利用しています。</p>
      </section>
    </main>
  </body>
</html>
